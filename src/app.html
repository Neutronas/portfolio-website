<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#f7f9fc" />
		<meta name="color-scheme" content="light" />
		<meta name="author" content="Lukas Ružauskas" />
		<meta name="robots" content="index, follow" />

		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<link rel="canonical" href="https://ruzauskas.lt/" />

		<!-- Primary -->
		<title>Lukas Ružauskas — Software Developer & Systems Analyst</title>
		<meta
			name="description"
			content="Portfolio of Lukas Ružauskas — software developer and systems analyst based in Lithuania. Careers, biography and projects in one scroll-driven experience."
		/>

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Lukas Ružauskas" />
		<meta property="og:url" content="https://ruzauskas.lt/" />
		<meta property="og:title" content="Lukas Ružauskas — Software Developer & Systems Analyst" />
		<meta
			property="og:description"
			content="Portfolio of Lukas Ružauskas — software developer and systems analyst based in Lithuania. Careers, biography and projects in one scroll-driven experience."
		/>
		<meta property="og:image" content="https://ruzauskas.lt/og.jpg" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Lukas Ružauskas — Software Developer & Systems Analyst" />
		<meta
			name="twitter:description"
			content="Portfolio of Lukas Ružauskas — software developer and systems analyst based in Lithuania."
		/>
		<meta name="twitter:image" content="https://ruzauskas.lt/og.jpg" />

		<!-- Structured data: Person -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "Person",
			"name": "Lukas Ružauskas",
			"alternateName": "Lukas Ruzauskas",
			"url": "https://ruzauskas.lt",
			"jobTitle": "Software Developer & Systems Analyst",
			"email": "lukas.ruzauskas@gmail.com",
			"nationality": "Lithuanian",
			"sameAs": [
				"https://github.com/Neutronas",
				"https://linkedin.com/in/lukas-ruzauskas/"
			]
		}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
